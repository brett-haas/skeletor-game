<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<!-- Home-screen web-app flags: launched from the iOS/Android home-screen icon,
     the conquest runs standalone with ZERO browser chrome. (The Fullscreen API
     is barred on iPhone Safari, so THIS is the true path to a chrome-free
     screen there.) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Skeletor's Conquest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#05060a" />
<title>SKELETOR'S CONQUEST: THE ROAD TO GRAYSKULL</title>
<style>
  /* ============================================================
     GLOBAL / PAGE SHELL
     A dark throne room of pure black to frame our retro canvas.
  ============================================================ */
  :root {
    --bg: #05060a;
    --bezel: #1a0f2e;
    --glow: #7d4bd6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 40%, #150a24 0%, var(--bg) 70%);
    overflow: hidden;
    font-family: "Courier New", monospace;
    color: #cbb6ef;
    -webkit-user-select: none;
    user-select: none;
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  /* ============================================================
     THE CANVAS — the window into Eternia.
     Internal resolution is fixed retro hardware size; CSS scales
     it up with crisp, un-blurred "pixelated" rendering.
  ============================================================ */
  #screen {
    /* Crisp pixel scaling — no muscle-bound blur allowed! */
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    image-rendering: -moz-crisp-edges;
    background: #000;
    border: 4px solid var(--bezel);
    box-shadow:
      0 0 0 4px #000,
      0 0 40px 4px rgba(125, 75, 214, 0.55),
      inset 0 0 60px rgba(0, 0, 0, 0.6);
    /* Actual on-screen size set by JS to an integer multiple. */
  }

  #hint {
    margin-top: 10px;
    font-size: 12px;
    letter-spacing: 1px;
    color: #5c4a82;
    text-align: center;
    line-height: 1.6;
  }
  #hint b { color: var(--glow); }

  /* ============================================================
     TOUCH CONTROLS — an on-screen legion for the fingertip army.
     Hidden until JS detects a touch device (body.touch). They float
     OVER the canvas so they steal no space from the window to Eternia.
  ============================================================ */
  #touch { display: none; }
  body.touch #touch {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;   /* only the pads/buttons catch touches */
    touch-action: none;
    /* The fingertip legion stands guard but must not blot out the window to
       Eternia. Dim the whole overlay to a ghostly haze; pressed controls still
       read brighter than idle since .active alphas scale with this. Tune here. */
    opacity: 0.4;
  }
  body.touch #hint { display: none; }
  /* No craven bezel on a phone — the conquest fills the glass edge-to-edge. */
  body.touch #screen { border: 0; box-shadow: none; }
  body.touch #stage { padding: 0; }

  .tc {
    position: absolute;
    pointer-events: auto;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e9dcff;
    font-family: "Courier New", monospace;
    font-weight: bold;
    background: rgba(26, 15, 46, 0.55);
    border: 2px solid rgba(125, 75, 214, 0.7);
    box-shadow: 0 0 12px rgba(125, 75, 214, 0.35);
    backdrop-filter: blur(2px);
  }
  .tc.active {
    background: rgba(125, 75, 214, 0.55);
    border-color: #cbb6ef;
  }

  /* Left thumb: an NES-style cross D-pad. Four arms of matte plastic form the
     plus; the pressed arm lights up (fed by the direction classes main.js
     toggles). The pad's hit area is still the full square, so the circular
     steering math in main.js is untouched — corners read as diagonals. */
  #pad {
    left: max(18px, env(safe-area-inset-left));
    bottom: max(22px, env(safe-area-inset-bottom));
    width: 120px; height: 120px;
    background: none;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    backdrop-filter: none;
  }
  #pad .arm {
    position: absolute;
    background: #160d24;
    border: 2px solid rgba(125, 75, 214, 0.55);
    box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.6);
    transition: background 40ms linear, box-shadow 40ms linear;
    pointer-events: none;
  }
  #pad .arm.up    { left: 38px; top: 0;    width: 44px; height: 62px; border-bottom: 0; border-radius: 8px 8px 0 0; }
  #pad .arm.down  { left: 38px; bottom: 0; width: 44px; height: 62px; border-top: 0;    border-radius: 0 0 8px 8px; }
  #pad .arm.left  { top: 38px; left: 0;    height: 44px; width: 62px; border-right: 0;  border-radius: 8px 0 0 8px; }
  #pad .arm.right { top: 38px; right: 0;   height: 44px; width: 62px; border-left: 0;   border-radius: 0 8px 8px 0; }
  /* Directional arrow etched into each arm (CSS triangle). */
  #pad .arm::before {
    content: ''; position: absolute; width: 0; height: 0;
    border: 8px solid transparent;
  }
  #pad .arm.up::before    { top: 8px;    left: 50%; transform: translateX(-50%); border-bottom-color: rgba(203, 182, 239, 0.7); }
  #pad .arm.down::before  { bottom: 8px; left: 50%; transform: translateX(-50%); border-top-color: rgba(203, 182, 239, 0.7); }
  #pad .arm.left::before  { left: 8px;   top: 50%;  transform: translateY(-50%); border-right-color: rgba(203, 182, 239, 0.7); }
  #pad .arm.right::before { right: 8px;  top: 50%;  transform: translateY(-50%); border-left-color: rgba(203, 182, 239, 0.7); }
  /* Center hub — the pivot of the cross. */
  #pad .hub {
    position: absolute; left: 40px; top: 40px; width: 40px; height: 40px;
    border-radius: 50%; background: #221636;
    border: 2px solid rgba(125, 75, 214, 0.55);
    box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.6);
    pointer-events: none;
  }
  /* Pressed arm blazes with Havoc-purple. */
  #pad.up    .arm.up,
  #pad.down  .arm.down,
  #pad.left  .arm.left,
  #pad.right .arm.right {
    background: rgba(125, 75, 214, 0.85);
    box-shadow: 0 0 12px rgba(125, 75, 214, 0.6);
  }

  /* Right thumb: JUMP sits directly beneath the PAUSE button — same horizontal
     center — with FIRE down-and-left of it. Both are pinned to the pause
     button's right-edge base (max(12px, inset-right)) so the JUMP/PAUSE column
     stays aligned however the safe-area insets land. JUMP's 62px width centers
     on the 46px pause button when its right offset is (pause-base - 8px); FIRE
     keeps a clear gap on BOTH axes so the two never crowd or overlap. */
  #btnFire {
    right: calc(max(12px, env(safe-area-inset-right)) + 48px);
    bottom: max(18px, env(safe-area-inset-bottom));
    width: 62px; height: 62px; border-radius: 50%; font-size: 13px;
  }
  #btnJump {
    right: calc(max(12px, env(safe-area-inset-right)) - 8px);
    bottom: calc(max(18px, env(safe-area-inset-bottom)) + 80px);
    width: 62px; height: 62px; border-radius: 50%; font-size: 13px;
  }

  /* Top-right: pause / start / continue (sends SPACE + ENTER). Nudged down so
     it clears the top HUD bar and never brushes the weapon name. */
  #btnMenu {
    right: max(12px, env(safe-area-inset-right));
    top: calc(max(12px, env(safe-area-inset-top)) + 20px);
    width: 46px; height: 34px; border-radius: 8px; font-size: 12px;
  }

  /* Loading placeholder shown before the engine seizes control. */
  #boot {
    position: absolute;
    color: var(--glow);
    font-size: 18px;
    letter-spacing: 3px;
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse { from { opacity: .35; } to { opacity: 1; } }
</style>
</head>
<body>
  <div id="stage">
    <div id="boot">SUMMONING SNAKE MOUNTAIN…</div>
    <!-- Virtual retro resolution: 426 x 240 (16:9 widescreen). Scaled by JS. -->
    <canvas id="screen" width="426" height="240"></canvas>
    <div id="hint">
      <b>WASD</b> move / aim &nbsp;•&nbsp; <b>J</b> fire (hold) &nbsp;•&nbsp;
      <b>K</b> jump &nbsp;•&nbsp; <b>SPACE</b> pause &nbsp;•&nbsp; <b>ENTER</b> start
      <br>fills the screen on first click / key &nbsp;•&nbsp; <b>ESC</b> exit fullscreen
    </div>
  </div>

  <!-- On-screen touch controls. Hidden until main.js confirms a touch device
       and adds `touch` to <body>. They only manipulate the Input key Sets. -->
  <div id="touch">
    <div id="pad" class="tc"><span class="arm up"></span><span class="arm down"></span><span class="arm left"></span><span class="arm right"></span><span class="hub"></span></div>
    <div id="btnFire" class="tc">FIRE</div>
    <div id="btnJump" class="tc">JUMP</div>
    <div id="btnMenu" class="tc">❚❚</div>
  </div>

  <!-- The engine of dark conquest, split into a disciplined legion.
       Loaded as classic scripts in dependency order — they share one global
       scope, so no build step or server is needed. Just open this file. -->
  <script src="src/config.js"></script>   <!-- constants, enums, palette -->
  <script src="src/utils.js"></script>    <!-- math, AABB, draw helpers -->
  <script src="src/input.js"></script>    <!-- keyboard + 8-dir aiming -->
  <script src="src/camera.js"></script>   <!-- 2D camera + depth projector -->
  <script src="src/weapons.js"></script>  <!-- weapon fire factories -->
  <script src="src/entities.js"></script> <!-- Player, Enemy, Projectile... -->
  <script src="src/bosses.js"></script>   <!-- the three stage bosses -->
  <script src="src/levels.js"></script>   <!-- level geometry + spawns -->
  <script src="src/engine.js"></script>   <!-- GameEngine state machine -->
  <script src="src/main.js"></script>     <!-- bootstrap -->

</body>
</html>
